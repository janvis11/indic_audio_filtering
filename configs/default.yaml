audio:
  target_sr: 16000
  mono: true
  max_duration_sec: 30.0

modules:
  enable_vad: true
  enable_quality_proxy: true
  enable_asr_bonus: true
  enable_langid_bonus: true

thresholds:
  reject:
    min_duration_sec: 0.40
    max_duration_sec: 35.0
    min_rms_db: -50.0
    max_clipping_ratio: 0.050
    max_silence_ratio: 0.98
    min_speech_ratio: 0.03
    min_quality_proxy: 0.15
    min_snr_db: -5.0

  review:
    max_clipping_ratio: 0.010
    max_silence_ratio: 0.75
    min_speech_ratio: 0.20
    min_quality_proxy: 0.40
    min_asr_confidence: -1.25
    min_snr_db: 8.0

  asr_flags:
    empty_transcript_penalty: 0.20
    low_confidence_threshold: -1.25
    low_confidence_penalty: 0.35
    non_speech_ratio_threshold: 0.12
    non_speech_penalty: 0.25

scoring:
  weights:
    signal: 0.22
    vad: 0.18
    quality: 0.22
    snr: 0.15
    asr: 0.18
    language: 0.05
  keep_min: 68.0
  review_min: 42.0